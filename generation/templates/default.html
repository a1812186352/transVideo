<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperFrames Project</title>
  <style>
    :root {
      --canvas-width: 1920px;
      --canvas-height: 1080px;
      --track-height: 120px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }
    .hyper-canvas {
      position: relative;
      width: var(--canvas-width);
      height: var(--canvas-height);
      margin: 0 auto;
      background: #000;
      overflow: hidden;
    }
    .hyper-track {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--track-height);
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .hyper-track[data-track-index="0"] { top: 0; }
    .hyper-track[data-track-index="1"] { top: var(--track-height); }
    .hyper-track[data-track-index="2"] { top: calc(var(--track-height) * 2); }
    .hyper-track[data-track-index="3"] { top: calc(var(--track-height) * 3); }
    .hyper-track[data-track-index="4"] { top: calc(var(--track-height) * 4); }

    /* Module type styles */
    [data-type="title"] {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }
    [data-type="subtitle"] {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 40px;
      font-size: 28px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }
    [data-type="video_segment"] {
      background: #0a0a1a;
    }
    [data-type="transition"] {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    [data-type="effect"] {
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }
    [data-type="audio"] {
      background: rgba(100, 200, 100, 0.08);
    }

    /* HyperFrames time-positioned modules: data-start / data-duration drive position */
    .hyper-module {
      position: absolute;
      overflow: hidden;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!--
    HyperFrames Default Template
    ============================
    This template uses data-* attributes for declarative module placement.
    The HyperFrames engine reads these attributes and renders them accordingly.

    Key attributes on <div class="hyper-module">:
      - data-module-id: Unique module identifier
      - data-type: One of title / video_segment / subtitle / transition / audio / effect
      - data-start: Start time in seconds
      - data-duration: Duration in seconds
      - data-track-index: Which track this module occupies
      - data-label: Human-readable label
      - data-source-path: Path to source asset
      - data-text: Text content for title/subtitle modules
      - data-animation: Animation name
      - data-transition: Transition type between segments

    Track layout: tracks are stacked vertically with --track-height spacing.
  -->
  <div class="hyper-canvas" id="hyper-canvas">
    <!-- Tracks are injected by the Composer based on script.json tracks array -->
    <!-- Modules are injected as .hyper-module elements with data-* attributes -->
  </div>
</body>
</html>
